<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Amiral Panel</title>

<style>

body{
    background:#121212;
    color:white;
    font-family:Arial;
    padding:40px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:15px;
    border-bottom:1px solid #333;
}

.online{
color:#00ff88;
}

.offline{
color:red;
}

</style>

</head>

<body>

<h1>⚓ Amiral Yönetim Paneli</h1>

<table>

<tr>

<th>ID</th>
<th>İsim</th>
<th>Telefon</th>
<th>Durum</th>

</tr>

{% for rep in representatives %}

<tr>

<td>{{rep.id}}</td>

<td>{{rep.name}}</td>

<td>{{rep.phone}}</td>

<td>

{% if rep.status == 1 %}

<span class="online">🟢 Online</span>

{% else %}

<span class="offline">🔴 Offline</span>

{% endif %}

</td>

</tr>

{% endfor %}

</table>

</body>

</html>
