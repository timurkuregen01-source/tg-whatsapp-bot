# Render Blueprint — Amiral Support Panel
# Panel'i canlıya alıp public link almak için. (Netlify Flask çalıştıramaz — bkz. README)
#
# Kurulum: Render → New → Blueprint → bu repo'yu bağla.
# Ortam değişkenlerini (sync:false olanlar) Render panelinden gir.

services:
  - type: web
    name: amiral-panel
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn panel:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PANEL_SECRET_KEY
        generateValue: true          # Render güçlü rastgele değer üretir
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD_HASH
        sync: false                  # panelden gir: generate_password_hash('...')
      - key: BOT_TOKEN
        sync: false                  # bot ayrı çalışacaksa panelde gerekmez

# NOT: Bot (bot.py) 7/24 polling ister ve panel ile AYNI database.db'yi paylaşmalı.
# İki ayrı Render servisi SQLite dosyasını paylaşamaz. Kalıcı çözüm v3.0.0'da
# PostgreSQL'e geçiş (panel + bot aynı DB'ye bağlanır). Detay README'de.
